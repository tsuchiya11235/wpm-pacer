spring:
  application:
    name: wpm_pacer

  # --- Default (dev/prod) datasource: PostgreSQL ---
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/wpm_pacer}
    username: ${SPRING_DATASOURCE_USERNAME:wpm_pacer}
    password: ${SPRING_DATASOURCE_PASSWORD:wpm_pacer}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # Flyway owns the schema; Hibernate only validates the mapping against it.
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  servlet:
    multipart:
      # OCR image uploads.
      max-file-size: 10MB
      max-request-size: 12MB

server:
  port: ${SERVER_PORT:8080}

# --- Application-specific configuration ---
wpm-pacer:
  cors:
    # Comma-separated list of allowed frontend origins.
    allowed-origins: ${WPM_PACER_CORS_ALLOWED_ORIGINS:http://localhost:3000}
  ocr:
    # Directory containing Tesseract language data (e.g. eng.traineddata).
    # See README for how to obtain it. Falls back to the TESSDATA_PREFIX env var.
    datapath: ${WPM_PACER_OCR_DATAPATH:${TESSDATA_PREFIX:./tessdata}}
    language: ${WPM_PACER_OCR_LANGUAGE:eng}

logging:
  level:
    org.flywaydb: info
