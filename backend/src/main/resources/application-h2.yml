# Quick-start profile: run the backend without a PostgreSQL install.
# Activate with:  --spring.profiles.active=h2
# Uses an in-memory H2 database and lets Hibernate create the schema, so Flyway
# (which targets PostgreSQL) is disabled here. The Flyway migration under
# db/migration remains the source of truth for real PostgreSQL deployments.
spring:
  datasource:
    url: jdbc:h2:mem:wpm_pacer;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
  h2:
    console:
      enabled: true
